```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SchemaSimplify — Database Normalization Tools</title>

<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0a0f;
  --surface: #140f18;
  --card: #1c1422;
  --border: #3a2545;

  /* BCNF = Pink */
  --accent: #f472b6;

  /* 3NF = Blue */
  --accent2: #60a5fa;

  /* Canonical = Purple */
  --accent3: #a78bfa;

  --text: #f0e8f4;
  --muted: #9a7aaa;
  --danger: #fb7185;

  --font-body: 'Inter', sans-serif;
}

/* GLOBAL */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
}

/* HEADER */
header {
  text-align: center;
  padding: 3rem;
  border-bottom: 1px solid var(--border);
}

header h1 {
  letter-spacing: -0.02em;
  font-size: 3rem;
  font-weight: 800;
}

/* TABS */
.tabs {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-top: 2rem;
}

.tab-btn {
  padding: .7rem 1.5rem;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
}

.tab-btn.active[data-tab="bcnf"] {
  color: var(--accent);
  border-color: var(--accent);
}

.tab-btn.active[data-tab="3nf"] {
  color: var(--accent-blue);
  border-color: var(--accent-blue);
}

.tab-btn.active[data-tab="canonical"] {
  color: var(--accent-purple);
  border-color: var(--accent-purple);
}

/* MAIN */
main {
  max-width: 900px;
  margin: 2rem auto;
}

/* CARD */
.card {
  background: var(--card);
  padding: 2rem;
  border-radius: 10px;
  margin-bottom: 2rem;
  border: 1px solid var(--border);
}

/* INPUT */
input, textarea {
  width: 100%;
  margin-top: .5rem;
  margin-bottom: 1rem;
  padding: .7rem;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-body);
}

/* BUTTONS */
.btn {
  padding: .7rem 1.5rem;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.btn-bcnf { background: var(--accent); color: white; }
.btn-3nf { background: var(--accent-blue); color: white; }
.btn-canonical { background: var(--accent-purple); color: white; }

/* RESULT */
.result {
  margin-top: 1.5rem;
  padding: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
}

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }

</style>
</head>

<body>

<header>
  <h1>SchemaSimplify</h1>
  <p>BCNF · 3NF · Canonical Cover</p>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="bcnf">BCNF</button>
  <button class="tab-btn" data-tab="3nf">3NF</button>
  <button class="tab-btn" data-tab="canonical">Canonical</button>
</div>

<main>

<!-- BCNF -->
<div class="panel active" id="panel-bcnf">
  <div class="card">
    <h2 style="color: var(--accent)">BCNF Decomposition</h2>

    <input type="text" placeholder="Attributes"/>
    <textarea placeholder="Functional Dependencies"></textarea>

    <button class="btn btn-bcnf">Compute</button>
    <div class="result">Result here...</div>
  </div>
</div>

<!-- 3NF -->
<div class="panel" id="panel-3nf">
  <div class="card">
    <h2 style="color: var(--accent-blue)">3NF Synthesis</h2>

    <input type="text"/>
    <textarea></textarea>

    <button class="btn btn-3nf">Compute</button>
    <div class="result"></div>
  </div>
</div>

<!-- CANONICAL -->
<div class="panel" id="panel-canonical">
  <div class="card">
    <h2 style="color: var(--accent-purple)">Canonical Cover</h2>

    <textarea></textarea>

    <button class="btn btn-canonical">Compute</button>
    <div class="result"></div>
  </div>
</div>

</main>

<script>
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});
</script>

</body>
</html>
```
